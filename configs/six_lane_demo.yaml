# 六车道道路演示配置：道路更宽，路径更长，y-h 耦合可能更明显

geometry:
  road_width: 28.0
  road_length: 100.0
  fiber_y: 0.0
  source_y: null
  channel_x_min: 0.0
  channel_x_max: 100.0
  channel_spacing: 1.0
  source_x_min: 0.0
  source_x_max: 100.0
  source_spacing: 5.0
  fiber_depth: 0.0
  source_depth: 0.0
cavity:
  enable_cavity: true
  cavity_x: 52.0
  cavity_y: 15.0
  cavity_h: 2.5
  cavity_radius: 2.5
  scattering_strength: 1.2
  attenuation_strength: 0.28
  tail_strength: 1.0
  label: "六车道疑似空洞"
velocity:
  rayleigh_velocity: 250.0
  velocity_model_type: "layered"
  layer_depths: [0.5, 2.5, 7.0]
  layer_velocities: [330.0, 270.0, 230.0]
  source_frequency: 32.0
  wavelet_type: "ricker"
  bandpass_freqmin: 8.0
  bandpass_freqmax: 80.0
  multi_band: [[15.0, 35.0], [35.0, 70.0], [70.0, 110.0]]
record:
  sampling_rate: 1000.0
  duration: 1.2
  t0: 0.02
  stack_count: 1
  random_seed: 2028
noise:
  noise_level: 0.03
  traffic_noise_level: 0.015
  bad_channel_fraction: 0.02
  weak_coupling_fraction: 0.08
  coupling_variation: 0.10
  direct_wave_strength: 1.0
  diffraction_strength: 1.1
processing:
  bandpass_freqmin: 8.0
  bandpass_freqmax: 80.0
  direct_wave_mute_width: 0.045
  direct_wave_subtraction_enable: true
  scan_x_min: 40.0
  scan_x_max: 64.0
  scan_x_step: 1.5
  scan_y_min: 5.0
  scan_y_max: 24.0
  scan_y_step: 1.5
  scan_h_min: 0.8
  scan_h_max: 5.0
  scan_h_step: 0.5
  scan_vr_min: 225.0
  scan_vr_max: 275.0
  scan_vr_step: 10.0
  score_method: "envelope"
  top_k: 10
  uncertainty_threshold: 0.90
